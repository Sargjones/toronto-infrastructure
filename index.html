<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toronto Infrastructure Intelligence</title>
<style>
  :root {
    --bg:       #f8f8f6;
    --surface:  #ffffff;
    --surface2: #f1efea;
    --border:   rgba(0,0,0,0.10);
    --border2:  rgba(0,0,0,0.18);
    --text1:    #1a1a18;
    --text2:    #5a5a56;
    --text3:    #9a9a94;
    --ok:       #3b6d11;
    --ok-bg:    #eaf3de;
    --warn:     #854f0b;
    --warn-bg:  #faeeda;
    --alert:    #a32d2d;
    --alert-bg: #fcebeb;
    --manual:   #888780;
    --manual-bg:#f1efea;
    --blue:     #185fa5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #1a1a18;
      --surface:  #242422;
      --surface2: #2e2e2c;
      --border:   rgba(255,255,255,0.10);
      --border2:  rgba(255,255,255,0.18);
      --text1:    #f0efe8;
      --text2:    #a8a8a0;
      --text3:    #686860;
      --ok:       #97c459;
      --ok-bg:    #1e2e10;
      --warn:     #ef9f27;
      --warn-bg:  #2a1e08;
      --alert:    #f09595;
      --alert-bg: #2e1010;
      --manual:   #68686a;
      --manual-bg:#28282a;
      --blue:     #85b7eb;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text1);
    font-size: 15px;
    line-height: 1.5;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border2);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { display: flex; align-items: baseline; gap: 10px; }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .topbar-sub { font-size: 12px; color: var(--text3); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .pulse { display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: var(--ok); margin-right: 5px;
    animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  #status-dot.warn  { background: var(--warn); animation: none; }
  #status-dot.alert { background: var(--alert); animation: pulse 1s infinite; }
  #status-dot.error { background: var(--alert); animation: none; opacity: .5; }

  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  .summary-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.5rem; align-items: center;
  }
  .pill {
    font-size: 12px; padding: 3px 10px;
    border-radius: 99px; font-weight: 500;
  }
  .pill-ok     { background: var(--ok-bg);     color: var(--ok); }
  .pill-warn   { background: var(--warn-bg);   color: var(--warn); }
  .pill-alert  { background: var(--alert-bg);  color: var(--alert); }
  .pill-manual { background: var(--manual-bg); color: var(--manual); }
  .pill-error  { background: var(--alert-bg);  color: var(--alert); opacity:.7; }
  .summary-date { font-size: 12px; color: var(--text3); margin-left: auto; }

  .alert-banner {
    background: var(--alert-bg);
    border: 0.5px solid var(--alert);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    font-size: 13px;
    color: var(--alert);
  }
  .alert-banner strong { font-weight: 600; }

  .sector { margin-bottom: 1.75rem; }
  .sector-header {
    font-size: 11px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }

  /* Tier sub-headers within sectors */
  .tier-subheader {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
    padding: 5px 0 5px 10px;
    margin: 14px 0 8px;
    border-left: 3px solid var(--tier-color, var(--border2));
    color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .tier-subheader:first-of-type { margin-top: 4px; }
  .tier-subheader .tier-desc {
    font-size: 10px; font-weight: 400; letter-spacing: .02em;
    color: var(--text3); text-transform: none;
  }
  .tier-1 { --tier-color: #b8860b; }
  .tier-2 { --tier-color: #4a7fa5; }
  .tier-3 { --tier-color: #4a8c5c; }
  @media (prefers-color-scheme: dark) {
    .tier-1 { --tier-color: #d4a94a; }
    .tier-2 { --tier-color: #7ab3d4; }
    .tier-3 { --tier-color: #7abf90; }
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
    overflow: visible;
  }
  .sector { overflow: visible; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 10px;
    position: relative;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card.is-alert { border-color: var(--alert); background: var(--alert-bg); }
  .card.is-warn  { border-color: var(--warn);  background: var(--warn-bg); }
  .card.is-manual { opacity: .65; }
  /* Muted transport cards — present but lower visual urgency */
  .card.is-muted { opacity: .7; }
  .card.is-muted.is-alert {
    border-color: var(--warn); background: var(--warn-bg);
  }
  .card.is-muted.is-alert .card-value { color: var(--warn); }
  .card.is-muted.is-alert .card-note  { color: var(--warn); }
  .card.is-muted:hover { opacity: 1; }
  .card.is-manual .card-info-btn { opacity: 1; }
  .card.is-manual:hover { opacity: 1; }

  .card-dot {
    position: absolute; top: 11px; right: 11px;
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-ok     { background: var(--ok); }
  .dot-warn   { background: var(--warn); }
  .dot-alert  { background: var(--alert); }
  .dot-manual { background: var(--manual); }
  .dot-error  { background: var(--alert); opacity: .5; }

  .card-label {
    font-size: 12px; color: var(--text2);
    margin-bottom: 4px; padding-right: 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-value {
    font-size: 22px; font-weight: 600;
    letter-spacing: -.02em; line-height: 1.1;
    color: var(--text1);
  }
  .card.is-alert .card-value { color: var(--alert); }
  .card.is-warn  .card-value { color: var(--warn); }
  .card.is-manual .card-value {
    font-size: 13px; font-weight: 400;
    color: var(--text3); margin-top: 2px;
  }
  .card-unit    { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .card-context { font-size: 11px; color: var(--text2); margin-top: 3px; font-style: italic; }
  .card-date    { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .card-note {
    font-size: 11px; color: var(--warn);
    margin-top: 5px; line-height: 1.3;
  }
  .card.is-alert .card-note { color: var(--alert); }


  .card-tier {
    display: inline-block;
    font-size: 10px; font-weight: 600; letter-spacing: .04em;
    padding: 1px 6px; border-radius: 99px;
    margin-top: 5px;
    background: rgba(24,95,165,0.10); color: var(--blue);
    opacity: .8;
  }
  @media (prefers-color-scheme: dark) {
    .card-tier { background: rgba(133,183,235,0.12); }
  }

  /* ── Notes tooltip ─────────────────────────────────────────────────────── */
  /* The card is the positioning parent (already position:relative). */
  .card-info-btn {
    position: absolute; bottom: 9px; right: 10px;
    width: 16px; height: 16px; border-radius: 50%;
    background: transparent;
    border: 0.5px solid var(--border2);
    color: var(--text3);
    font-size: 10px; font-weight: 700; line-height: 16px;
    text-align: center; cursor: default;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color .1s, color .1s;
    z-index: 1;
  }
  .card:hover .card-info-btn { border-color: var(--blue); color: var(--blue); }

  .card-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    max-height: 340px;
    overflow-y: auto;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 10px 13px;
    font-size: 11px; line-height: 1.55; color: var(--text2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 100;
    pointer-events: auto;
    white-space: normal;
  }
  .tooltip-scraper {
    color: var(--text2);
  }
  .tooltip-divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 7px 0;
  }
  .tooltip-knowledge-title {
    font-weight: 600; color: var(--text1);
    margin-bottom: 3px; font-size: 11px;
  }
  .tooltip-knowledge-body {
    color: var(--text2);
  }
  /* Flip to below the card when near the top of the viewport */
  .card-tooltip.flip-down {
    bottom: auto;
    top: calc(100% + 6px);
  }
  /* Nudge left/right when centered tooltip would overflow viewport edges */
  .card-tooltip.nudge-left  { left: auto; right: -6px;  transform: none; }
  .card-tooltip.nudge-right { left: -6px; transform: none; }
  /* tooltip shown/hidden via JS mouseenter/mouseleave — see script */

  /* Ensure cards in the last grid row don't clip their tooltip */
  .cards { overflow: visible; }
  .sector { overflow: visible; }

  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 12px; color: var(--text2);
    margin-bottom: 1.25rem; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .footer {
    font-size: 11px; color: var(--text3);
    border-top: 0.5px solid var(--border);
    padding: 1rem 0 2rem;
    margin-top: .5rem;
    display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }

  #loading {
    text-align: center; padding: 4rem 0;
    font-size: 14px; color: var(--text3);
  }
  #error-msg {
    background: var(--alert-bg);
    border: 0.5px solid var(--alert);
    border-radius: 8px; padding: 1rem;
    color: var(--alert); font-size: 13px;
    margin: 2rem 0; display: none;
  }

  .brief-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.75rem;
  }
  .brief-header {
    display: flex; align-items: baseline;
    justify-content: space-between; flex-wrap: wrap;
    gap: 8px; margin-bottom: 1rem;
    padding-bottom: .75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .brief-title { font-size: 14px; font-weight: 600; color: var(--text1); }
  .brief-date  { font-size: 12px; color: var(--text3); }
  .brief-badge {
    font-size: 11px; padding: 2px 8px;
    border-radius: 99px; font-weight: 500;
    background: var(--warn-bg); color: var(--warn);
  }
  .brief-content { font-size: 14px; line-height: 1.7; color: var(--text1); }
  .brief-content h2 {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 1rem 0 .4rem;
  }
  .brief-content h2:first-child { margin-top: 0; }
  .brief-content p  { margin-bottom: .75rem; }
  .brief-content ul { margin: .25rem 0 .75rem 1.25rem; }
  .brief-content li { margin-bottom: .25rem; }
  .brief-content em { color: var(--text2); font-style: normal; font-size: 12px; }
  .brief-escalated { border-color: var(--alert); }
  .brief-escalated .brief-badge { background: var(--alert-bg); color: var(--alert); }
  .brief-loading { font-size: 13px; color: var(--text3); font-style: italic; }
  .snapshot-banner {
    display: none;
    background: var(--warn-bg); color: var(--warn);
    border: 1px solid var(--warn); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; margin-bottom: 1rem;
  }
  .snapshot-banner a { color: var(--warn); text-decoration: underline; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Toronto Infrastructure Intelligence</span>
    <span class="topbar-sub" id="topbar-sub">loading…</span>
  </div>
  <div class="topbar-right">
    <span id="status-dot" class="pulse"></span>
  </div>
</div>

<div class="main">
  <div id="snapshot-banner" class="snapshot-banner"></div>
  <div id="loading">Loading data…</div>
  <div id="error-msg"></div>
  <div id="brief-panel" style="display:none"></div>
  <div id="dashboard" style="display:none">
    <div class="summary-bar" id="summary-bar"></div>
    <div id="alert-banners"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot dot-ok"></span>normal</span>
      <span class="legend-item"><span class="legend-dot dot-warn"></span>watch</span>
      <span class="legend-item"><span class="legend-dot dot-alert"></span>alert</span>
      <span class="legend-item"><span class="legend-dot dot-manual"></span>manual retrieval</span>
    </div>
    <div id="sectors"></div>
    <div class="footer">
      <span id="footer-sources">Toronto Infrastructure Intelligence</span>
      <span id="footer-run"></span>
    </div>
  </div>
</div>

<script>
// URL parameter override: ?data=tii_data_20250317.json freezes to a specific snapshot.
// Used by weekly Wix blog post iframes — e.g. criticalto.ca/?data=tii_data_week_20250317.json
// Brief override: ?brief=tii_brief_20250317.md
// If no parameter, defaults to live latest feeds.
(function() {
  const params = new URLSearchParams(window.location.search);
  const dataParam  = params.get("data");
  const briefParam = params.get("brief");
  window._TII_DATA_URL  = dataParam
    ? "https://data.criticalto.ca/" + dataParam
    : "https://data.criticalto.ca/tii_data_latest.json";
  window._TII_BRIEF_URL = briefParam
    ? "https://data.criticalto.ca/" + briefParam
    : "https://data.criticalto.ca/tii_brief_latest.md";
})();
const DATA_URL  = window._TII_DATA_URL;
const BRIEF_URL = window._TII_BRIEF_URL;

const SECTOR_ORDER = ["energy","water","health","food","transport_logistics","environment","financial","public_safety"];
const SECTOR_LABELS = {
  energy:"Energy", water:"Water", health:"Health",
  food:"Food & prices", transport_logistics:"Transport & Logistics",
  environment:"Environment", financial:"Financial",
  public_safety:"Public Safety & Cost"
};

// ── Static knowledge layer ────────────────────────────────────────────────
// Keyed by lowercase substring of indicator name.
// Each entry: { title, body } — title is bolded, body is plain text.
// Matched by first key found in the indicator name (most specific first).
const CARD_KNOWLEDGE = {

  // ENERGY — generation sources
  "nuclear output": {
    title: "Ontario nuclear fleet",
    body: "Three stations supply ~55% of Ontario's electricity. " +
          "Darlington (Clarington, on Lake Ontario): 4 CANDU reactors, 3,512 MW capacity — currently undergoing refurbishment unit by unit through 2026. " +
          "Bruce (Kincardine, on Lake Huron): 8 CANDU reactors in two stations, 6,232 MW — largest operating nuclear facility in the Western Hemisphere. " +
          "Pickering (Pickering, on Lake Ontario): 4 of 8 original CANDU units still operating, ~2,000 MW — licensed to run until 2026, with debate over further extension. " +
          "CANDU reactors use heavy water and natural uranium, allowing refuelling while online."
  },
  "hydro output": {
    title: "Ontario hydroelectric system",
    body: "Hydro contributes ~24% of Ontario generation and is the primary dispatchable clean source. " +
          "Niagara: Sir Adam Beck 1 & 2 (Queenston) plus Sir Adam Beck Pump Generating Station — combined ~1,800 MW. Water flow governed by the International Joint Commission treaty with the US. " +
          "Ottawa River: Chats Falls, Barrett Chute, and others operated by OPG and Hydro-Ottawa. " +
          "Northern Ontario: dozens of run-of-river stations on the Mattagami, Abitibi, Mississagi, and other rivers. " +
          "Total Ontario hydro capacity: ~8,000 MW (including contracted private). Output varies significantly with precipitation and seasonal snowmelt."
  },
  "gas output": {
    title: "Ontario gas peaker fleet",
    body: "Natural gas plants are marginal-cost: they run only when baseload (nuclear + hydro) cannot meet demand, making gas output the primary real-time demand stress signal. " +
          "Major stations: Lennox (Napanee area, 2,100 MW oil/gas, rarely dispatched), Portlands Energy Centre (Toronto waterfront, 550 MW combined-cycle), Goreway (Brampton, 875 MW), York Energy Centre (Vaughan, 393 MW), Halton Hills (400 MW). " +
          "Many smaller peakers (50-200 MW) across the grid. " +
          "Elevated gas dispatch raises wholesale electricity prices under the HOEP (Hourly Ontario Energy Price) and signals that cold snaps, heat waves, or baseload outages are stressing the system. " +
          "Ontario is phasing out gas generation by 2030-32 under provincial policy, though the timeline is under review."
  },
  "wind output": {
    title: "Ontario wind generation",
    body: "Ontario has ~5,600 MW of installed wind capacity, mostly contracted under the FIT and LRP programs. " +
          "Primary regions: Bruce Peninsula and Lake Huron shoreline (strongest consistent winds), Prince Edward County, Amaranth/Shelburne area, and scattered eastern Ontario sites. " +
          "Wind output is non-dispatchable and variable — IESO forecasts and curtails wind when the grid cannot absorb it (spill). " +
          "Ontario frequently exports surplus wind generation to Quebec, Michigan, and New York overnight."
  },
  "solar output": {
    title: "Ontario solar generation",
    body: "Ontario has ~4,300 MW of installed solar capacity — predominantly small rooftop and ground-mount systems contracted under the FIT microFIT programs. " +
          "Output is highly variable by season and time of day: peaks mid-afternoon in summer, near-zero in winter evenings. " +
          "The large Sarnia Photovoltaic Power Plant (~80 MW) was the world's largest solar farm at its 2010 opening. " +
          "Solar contributes to midday demand reduction but does not help with evening peak or winter morning load."
  },
  "biofuel output": {
    title: "Ontario bioenergy generation",
    body: "A small but dispatchable segment of the Ontario grid. " +
          "Sources include landfill gas (multiple sites), biomass combustion (Atikokan Generating Station converted from coal in 2014, 205 MW), and biogas from wastewater treatment. " +
          "Bioenergy is valued for dispatchability — it can be scheduled unlike wind and solar. " +
          "Atikokan in northwestern Ontario is Canada's largest biomass power plant by capacity."
  },
  "total generation": {
    title: "Ontario grid total output",
    body: "The sum of all fuel sources dispatched by IESO in a given hour. " +
          "Ontario's grid is operated by IESO (Independent Electricity System Operator), which balances supply and demand in real time across ~100 generators. " +
          "Ontario is a net exporter most hours, sending surplus power to Quebec, Manitoba, Michigan, New York, and Minnesota via interconnections. " +
          "Annual generation is roughly 140-150 TWh. Peak demand typically occurs on hot summer weekday afternoons (July-August) and cold winter mornings (January-February)."
  },
  "peak demand": {
    title: "Ontario demand index",
    body: "Measures current Ontario-wide electricity consumption relative to the 2024 annual peak (~25,000 MW). " +
          "Demand is served by Ontario generators plus net imports from Quebec and US states. " +
          "IESO publishes a reliability outlook quarterly — reserve margin (supply above peak requirement) is the key long-term adequacy metric. " +
          "Demand response programs allow large industrial users (smelters, auto plants) to shed load during supply emergencies in exchange for rate credits."
  },
  "ontario demand": {
    title: "Ontario real-time demand",
    body: "Total metered consumption across the Ontario grid in MW. " +
          "Excludes losses and self-generation (e.g. industrial cogen). " +
          "The IESO publishes this in near-real-time via the Ontario Demand Multiday file, updated hourly. " +
          "Seasonal baseline: winter peak ~19,000-21,000 MW on cold mornings; summer peak ~22,000-25,000 MW on hot afternoons; overnight minimum ~12,000-14,000 MW."
  },

  // ENERGY — supply chain
  "tcpl parkway": {
    title: "Eastern Triangle — Parkway Receipts",
    body: "The Parkway hub (near Milton, ON) is the primary gas delivery point for the Greater Toronto Area and eastern Ontario. " +
          "Gas arrives here via TC Energy's Mainline from western Canadian fields (Alberta and BC), having transited the Northern Ontario Line. " +
          "Union Gas (now Enbridge Gas) distributes from Parkway to residential and commercial users across the GTA. " +
          "The Dawn Hub (near Sarnia) is the main southwestern Ontario storage and trading point; Dawn-to-Parkway flow supplements Mainline receipts during peak demand. " +
          "High Parkway utilization means supply is tight at Toronto's gas entry point — a precursor to price spikes and potential curtailment of interruptible industrial users."
  },
  "northern ontario line": {
    title: "TCPL Northern Ontario Line",
    body: "The Northern Ontario Line (NOL) is the segment of TC Energy's Mainline that crosses northern Ontario from the Manitoba border to the Parkway area. " +
          "It is the main trunk through which western Canadian gas reaches Toronto and eastern Canada. " +
          "Capacity: approximately 4,400 MMcf/day at peak. " +
          "Constraint on the NOL restricts all downstream supply, including Parkway receipts and ultimately Toronto pump prices. " +
          "The NOL also serves as a transit route for gas flowing onward to Quebec and the Maritimes via other interconnects."
  },
  "brent crude": {
    title: "ICE Brent crude benchmark",
    body: "Brent is priced at the Sullom Voe terminal in the Shetland Islands and reflects North Sea crude blends. " +
          "It prices approximately 2/3 of globally traded oil. WTI (West Texas Intermediate) is the North American benchmark and typically trades $2-5/bbl below Brent. " +
          "Ontario refineries (Imperial Oil Sarnia, Shell Sarnia) process a mix of western Canadian heavy crude and imported light crude. " +
          "Pump price transmission lag: a $10/bbl move in Brent takes roughly 2-3 weeks to fully appear at Ontario pumps, filtered through refinery runs, wholesale rack prices, and retailer margins. " +
          "The CAD/USD exchange rate amplifies moves — a weaker loonie makes every barrel more expensive in Canadian dollars."
  },

  // WATER
  "water outage": {
    title: "Toronto water distribution network",
    body: "Toronto Water operates ~6,000 km of water mains ranging from 19th-century cast iron to modern ductile iron and PVC. " +
          "Average age of the network is over 40 years; the oldest mains in the downtown core date to the 1880s. " +
          "Approximately 1,200-1,500 watermain breaks occur annually — the majority in winter due to frost heave and temperature cycling. " +
          "Breaks are categorized as emergency (unplanned service interruption) or planned (maintenance with advance notice). " +
          "Toronto Water targets 15-20 km of watermain replacement per year under its capital plan."
  },

// Match an indicator name to a knowledge entry.
// Returns the knowledge object or null.
function lookupKnowledge(indicatorName) {
  const n = (indicatorName || "").toLowerCase();
  // Check keys from longest to shortest to prefer more specific matches
  const keys = Object.keys(CARD_KNOWLEDGE).sort((a, b) => b.length - a.length);
  for(const key of keys) {
    if(n.includes(key)) return CARD_KNOWLEDGE[key];
  }
  return null;
}

// Per-sector tier label text shown in the sub-header
const TIER_META = {
  energy: {
    1: "Global commodity",
    2: "Continental supply chain",
    3: "Local real-time delivery",
  },
  financial: {
    1: "Global & monetary",
    2: "Provincial transmission",
    3: "Local household impact",
  },
  water: {
    1: "Source & treatment",
    2: "Distribution network",
    3: "Social delivery",
  },
  health: {
    1: "Population signal",
    2: "System capacity",
    3: "Community & social determinants",
  },
  transport_logistics: {
    1: "International & intercity gateways",
    2: "Regional freight & commuter rail",
    3: "City transportation",
  },
  public_safety: {

    2: "Deployment efficiency",

  },
  food: {

  },

    3: "Local impact",
  },
};

function lookupTier(indicatorName) {
  const n = (indicatorName || "").toLowerCase();
  const keys = Object.keys(TIER_MAP).sort((a, b) => b.length - a.length);
  for(const key of keys) {
    if(n.includes(key)) return TIER_MAP[key];
  }
  return null;
}

function inferSector(name) {
  const n = (name||"").toLowerCase();
  if(/nuclear|hydro|gas output|wind|solar|biofuel|ontario demand|peak demand|generation|brent|storage|grid|reserve|tcpl|pipeline|parkway|mainline|dawn|enbridge/.test(n)) return "energy";
  if(/water|watermain|wwtp/.test(n)) return "water";
  if(/icu|er capacity|wastewater|blood|shelter/.test(n)) return "health";
  if(/cpi|grocery|food bank|inflation/.test(n)) return "food";
  if(/ttc|ridership|port|dwell|pearson|notam|airport|cyyz|go transit|via rail|freight|labour risk|cn rail|cn freight|cpkc|rail corridor/.test(n)) return "transport_logistics";
  if(/aqhi|air quality|smog/.test(n)) return "environment";
  if(/bank|rate|cad|usd|fuel|price|bankruptcy|insolvency|eviction|unemployment|trreb|sales.to.new|selling price/.test(n)) return "financial";
  if(/tps|sworn|fill rate|community safety|specialized operations|police staffing/.test(n)) return "public_safety";
  return "other";
}

function inferTier(notes) {
  // Extract tier label from the notes field written by the scraper.
  // Returns "T1", "T2", "T3", or null.
  if(!notes) return null;
  const m = notes.match(/Tier\s+([123])\s*[—–-]/i);
  if(!m) return null;
  return "T" + m[1];
}

function fmtValue(r) {
  const v = r.value;
  if(v === null || v === undefined) return "manual";
  if(typeof v === "number") {
    if(v >= 10000) return v.toLocaleString("en-CA", {maximumFractionDigits:0});
    if(v >= 1000)  return v.toLocaleString("en-CA", {maximumFractionDigits:0});
    if(v >= 100)   return v.toLocaleString("en-CA", {maximumFractionDigits:1});
    if(v >= 1)     return v.toLocaleString("en-CA", {maximumFractionDigits:2});
    return v.toLocaleString("en-CA", {maximumFractionDigits:4});
  }
  return String(v);
}

function fmtDate(d) {
  if(!d) return "";
  const s = String(d).trim();
  // ISO datetime: "2026-03-22T14:30:00Z" or "2026-03-22 14:30:00Z" — show date + HH:MM
  if(s.length >= 16 && (s[10] === "T" || s[10] === " ")) {
    return s.slice(0,10) + " " + s.slice(11,16);
  }
  // Date only
  if(s.length >= 10) return s.slice(0,10);
  return s;
}

function dotClass(s) {
  return {ok:"dot-ok",warn:"dot-warn",alert:"dot-alert",
          manual:"dot-manual",error:"dot-error"}[s] || "dot-manual";
}

function simpleMarkdown(md) {
  if(!md) return "";
  // Use string replace where possible to avoid regex/newline issues in sandboxed environments
  let out = md;
  out = out.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  out = out.replace(/^\* (.+)$/gm, "<li>$1</li>");
  out = out.split("\n\n").join("</p><p>");
  out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return out.trim();
}

async function loadBrief(isAlert) {
  const panel = document.getElementById("brief-panel");
  panel.style.display = "none";
  try {
    const res = await fetch(BRIEF_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("not found");
    const md = await res.text();

    let lines = md.split("\n");

    // Strip YAML frontmatter (--- ... ---) if present
    if(lines[0] && lines[0].trim() === "---") {
      const end = lines.findIndex((l, i) => i > 0 && l.trim() === "---");
      if(end !== -1) lines = lines.slice(end + 1);
    }

    // Find the heading line and body
    const headingIdx = lines.findIndex(l => l.startsWith("#"));
    const dateMatch  = lines.find(l => l.startsWith("*Week of"));
    const briefDate  = dateMatch ? dateMatch.replace(/\*/g, "").trim() : "";

    // Body = everything after the heading (or from the top if no heading)
    const bodyLines = lines.slice(headingIdx >= 0 ? headingIdx + 1 : 0);
    const body = bodyLines.join("\n").trim();

    // Hide panel if there is no real content
    if(!body || body.replace(/\s/g, "").length < 20) return;

    const escalated = isAlert ? " brief-escalated" : "";
    const badge = isAlert
      ? '<span class="brief-badge">Alert escalation — updated daily</span>'
      : '<span class="brief-badge" style="background:var(--ok-bg);color:var(--ok)">Weekly brief</span>';

    panel.style.display = "block";
    panel.innerHTML = `
      <div class="brief-panel${escalated}">
        <div class="brief-header">
          <span class="brief-title">Intelligence brief</span>
          ${badge}
          <span class="brief-date">${briefDate}</span>
        </div>
        <div class="brief-content"><p>${simpleMarkdown(body)}</p></div>
      </div>`;
  } catch(e) {
    panel.style.display = "none";
  }
}


function render(data) {
  const results = data.results || [];
  const t = data.totals || {};
  const ts = data.run_timestamp || "";
  const rd = data.run_date || ts.slice(0,10);

  // Build a human-readable datetime string from the ISO timestamp
  // run_timestamp is UTC ISO: "2026-03-22T14:30:00Z"
  let rdDisp = rd || "unknown";
  let rdFull = rd || "unknown";
  if(ts && ts.length >= 16) {
    const dateStr = ts.slice(0,10);
    const timeStr = ts.slice(11,16);   // HH:MM
    rdFull  = `${dateStr} ${timeStr} UTC`;
    rdDisp  = rdFull;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("topbar-sub").textContent = rdDisp;

  const dot = document.getElementById("status-dot");
  dot.className = "pulse";
  if((t.alert||0) > 0)     { dot.className = "alert"; }
  else if((t.warn||0) > 0) { dot.className = "warn"; }

  const bar = document.getElementById("summary-bar");
  bar.innerHTML = "";
  const pills = [
    [t.ok,    "ok",     "ok"],
    [t.warn,  "warn",   "warn"],
    [t.alert, "alert",  "alert"],
    [t.error, "error",  "errors"],
    [t.manual,"manual", "manual"],
  ];
  for(const [n, cls, label] of pills) {
    if(!n) continue;
    const p = document.createElement("span");
    p.className = `pill pill-${cls}`;
    p.textContent = `${n} ${label}`;
    bar.appendChild(p);
  }

  const banners = document.getElementById("alert-banners");
  banners.innerHTML = "";
  const MUTED_INDICATORS = ["go transit"];
  const alerts = results.filter(r =>
    r.status === "alert" &&
    !MUTED_INDICATORS.some(m => (r.indicator||"").toLowerCase().includes(m)));
  if(alerts.length > 0) {
    const b = document.createElement("div");
    b.className = "alert-banner";
    b.innerHTML = "<strong>Active alerts:</strong> " +
      alerts.map(r => `${r.indicator} (${fmtValue(r)} ${r.unit||""}) — ${r.threshold_note||""}`).join(" &nbsp;·&nbsp; ");
    banners.appendChild(b);
  }

  const bySector = {};
  for(const r of results) {
    // Three-way fallback: JSON sector field → TIER_MAP sector → inferSector
    const tierInfo = lookupTier(r.indicator);
    const s = r.sector || (tierInfo && tierInfo.sector) || inferSector(r.indicator);
    if(!bySector[s]) bySector[s] = [];
    bySector[s].push(r);
  }

  const allKeys = [...SECTOR_ORDER];
  for(const k of Object.keys(bySector)) {
    if(!allKeys.includes(k)) allKeys.push(k);
  }

  loadBrief((t.alert||0) > 0);

  const sectorsEl = document.getElementById("sectors");
  sectorsEl.innerHTML = "";

  // Build a single card element from a result object
  function buildCard(r) {
    const s = r.status || "manual";
    const isManual = s === "manual" || r.value === null;
    // Muted indicators — valid signals but lower consequence than critical infrastructure
    const MUTED_INDICATORS = ["go transit"];
    const isMuted = MUTED_INDICATORS.some(m => (r.indicator||"").toLowerCase().includes(m));
    const card = document.createElement("div");
    card.className = "card"
      + (s==="alert"?" is-alert":s==="warn"?" is-warn":isManual?" is-manual":"")
      + (isMuted?" is-muted":"");

    let noteHtml = "";
    if(r.threshold_note && !isManual) {
      noteHtml = `<div class="card-note">${r.threshold_note}</div>`;
    }
    const contextHtml = (r.context && !isManual)
      ? `<div class="card-context">${r.context}</div>` : "";

    // Tier badge from notes field (energy only — others use sub-headers now)
    const tierBadge = inferTier(r.notes);
    const tierHtml = tierBadge ? `<div class="card-tier">${tierBadge}</div>` : "";

    // Tooltip: scraper notes + static knowledge
    const scraperText = (r.notes || "").replace(/^Tier\s+\d+\s*[—\u2013\u2014-]\s*/i, "").trim();
    const knowledge = lookupKnowledge(r.indicator);
    const hasTooltip = scraperText || knowledge;

    let tooltipInner = "";
    if(scraperText) tooltipInner += `<div class="tooltip-scraper">${scraperText}</div>`;
    if(knowledge) {
      if(scraperText) tooltipInner += `<hr class="tooltip-divider">`;
      tooltipInner += `<div class="tooltip-knowledge-title">${knowledge.title}</div>`;
      tooltipInner += `<div class="tooltip-knowledge-body">${knowledge.body}</div>`;
    }
    const infoHtml = hasTooltip
      ? `<div class="card-info-btn" aria-label="Notes">i</div>
         <div class="card-tooltip">${tooltipInner}</div>` : "";

    card.innerHTML = `
      <div class="card-dot ${dotClass(s)}"></div>
      <div class="card-label">${r.indicator}</div>
      <div class="card-value">${isManual ? "manual" : fmtValue(r)}</div>
      ${!isManual ? `<div class="card-unit">${r.unit||""}</div>` : ""}
      ${contextHtml}
      ${tierHtml}
      <div class="card-date">${fmtDate(r.data_date)}</div>
      ${noteHtml}
      ${infoHtml}`;
    return card;
  }

  // Append a grid of cards (items array) to a parent element
  function appendCardGrid(parent, items) {
    const grid = document.createElement("div");
    grid.className = "cards";
    parent.appendChild(grid);
    for(const r of items) grid.appendChild(buildCard(r));
    return grid;
  }

  for(const sKey of allKeys) {
    const items = bySector[sKey];
    if(!items || items.length === 0) continue;

    const sec = document.createElement("div");
    sec.className = "sector";
    const sectorLink = sKey === "transport_logistics"
      ? ` <a href="freight-profile.html" target="_blank" rel="noopener" style="font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--blue);margin-left:8px;opacity:.8">What\u2019s at stake &rarr;</a>`
      : "";
    sec.innerHTML = `<div class="sector-header">${SECTOR_LABELS[sKey]||sKey}${sectorLink}</div>`;

    // Group items by tier
    const byTier = {};
    const noTier = [];
    for(const r of items) {
      const t = lookupTier(r.indicator);
      if(t && t.tier) {
        if(!byTier[t.tier]) byTier[t.tier] = [];
        byTier[t.tier].push(r);
      } else {
        noTier.push(r);
      }
    }

    const tierNums = Object.keys(byTier).map(Number).sort();
    const hasTiers = tierNums.length > 0;

    for(const tNum of tierNums) {
      const tierLabel = (TIER_META[sKey] || {})[tNum] || `Tier ${tNum}`;
      const subhdr = document.createElement("div");
      subhdr.className = `tier-subheader tier-${tNum}`;
      subhdr.innerHTML = `<span>Tier ${tNum}</span><span class="tier-desc">${tierLabel}</span>`;
      sec.appendChild(subhdr);
      appendCardGrid(sec, byTier[tNum]);
    }

    if(noTier.length > 0) {
      if(hasTiers) {
        const subhdr = document.createElement("div");
        subhdr.className = "tier-subheader";
        subhdr.style.cssText = "--tier-color: var(--border2)";
        subhdr.innerHTML = `<span class="tier-desc">Unclassified</span>`;
        sec.appendChild(subhdr);
      }
      appendCardGrid(sec, noTier);
    }

    sectorsEl.appendChild(sec);
  }

  // After render: correct tooltips that would overflow the viewport
  requestAnimationFrame(() => {
    document.querySelectorAll(".card-tooltip").forEach(tip => {
      tip.style.display = "block";
      const r = tip.getBoundingClientRect();
      tip.style.display = "";
      if(r.top < 4)                         tip.classList.add("flip-down");
      if(r.right > window.innerWidth - 4)   tip.classList.add("nudge-left");
      else if(r.left < 4)                   tip.classList.add("nudge-right");
    });
  });

  document.getElementById("footer-sources").textContent =
    "Sources: IESO · Bank of Canada · StatsCan · Toronto Open Data · Environment Canada · data.ontario.ca · open.canada.ca · NAV Canada · Toronto Police ASR · Stooq · Stockr · EIA";
  document.getElementById("footer-run").textContent =
    `TII v3.5 · scraper run ${rdFull} · auto-refresh every 6 hours`;
}

function showError(msg) {
  document.getElementById("loading").style.display = "none";
  const e = document.getElementById("error-msg");
  e.style.display = "block";
  e.textContent = msg;
}

async function loadData() {
  // If a ?data= param is set, show a snapshot banner so readers know this is a frozen view
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get("data");
  if(dataParam) {
    const banner = document.getElementById("snapshot-banner");
    if(banner) {
      banner.style.display = "block";
      banner.innerHTML = `<strong>📅 Weekly snapshot</strong> — This view is frozen to <strong>${dataParam}</strong>. `
        + `<a href="https://criticalto.ca" target="_blank">View live dashboard →</a>`;
    }
  }
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now(), {
      cache: "no-store",
      headers: { "Cache-Control": "no-cache" }
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } catch(e) {
    if(document.getElementById("dashboard").style.display === "none") {
      showError(`Could not load ${DATA_URL} — ${e.message}. ` +
        "Place tii_data_latest.json in the same folder as this HTML file, " +
        "or set DATA_URL to your JSON endpoint.");
    }
  }
}

loadData();

// ── Tooltip hover with grace period ──────────────────────────────────────────
// pointer-events: auto on tooltip means mouse can enter it to scroll.
// hideDelay gives the mouse time to travel from card into tooltip.
(function() {
  var HIDE_DELAY = 120; // ms grace period to move mouse into tooltip
  document.addEventListener("mouseover", function(e) {
    var card = e.target.closest(".card");
    if(!card) return;
    var tip = card.querySelector(".card-tooltip");
    if(!tip) return;
    clearTimeout(card._hideTimer);
    tip.style.display = "block";
    // Flip/nudge correction on first show
    if(!card._positioned) {
      card._positioned = true;
      var r = tip.getBoundingClientRect();
      if(r.top < 4)                        tip.classList.add("flip-down");
      if(r.right > window.innerWidth - 4)  tip.classList.add("nudge-left");
      else if(r.left < 4)                  tip.classList.add("nudge-right");
    }
  });
  document.addEventListener("mouseout", function(e) {
    var card = e.target.closest(".card");
    if(!card) return;
    var tip = card.querySelector(".card-tooltip");
    if(!tip) return;
    // Only hide if mouse left both card AND tooltip
    var to = e.relatedTarget;
    if(to && (card.contains(to) || tip.contains(to))) return;
    card._hideTimer = setTimeout(function() {
      tip.style.display = "none";
    }, HIDE_DELAY);
  });
  // If mouse enters tooltip, cancel the hide timer
  document.addEventListener("mouseover", function(e) {
    var tip = e.target.closest(".card-tooltip");
    if(!tip) return;
    var card = tip.closest(".card");
    if(card) clearTimeout(card._hideTimer);
  });
  // If mouse leaves tooltip entirely (not back into card), hide
  document.addEventListener("mouseout", function(e) {
    var tip = e.target.closest(".card-tooltip");
    if(!tip) return;
    var card = tip.closest(".card");
    if(!card) return;
    var to = e.relatedTarget;
    if(to && (card.contains(to) || tip.contains(to))) return;
    card._hideTimer = setTimeout(function() {
      tip.style.display = "none";
    }, HIDE_DELAY);
  });
})();
