<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toronto Infrastructure Intelligence</title>
<style>
  :root {
    --bg:       #f8f8f6;
    --surface:  #ffffff;
    --surface2: #f1efea;
    --border:   rgba(0,0,0,0.10);
    --border2:  rgba(0,0,0,0.18);
    --text1:    #1a1a18;
    --text2:    #5a5a56;
    --text3:    #9a9a94;
    --ok:       #3b6d11;
    --ok-bg:    #eaf3de;
    --warn:     #854f0b;
    --warn-bg:  #faeeda;
    --alert:    #a32d2d;
    --alert-bg: #fcebeb;
    --manual:   #888780;
    --manual-bg:#f1efea;
    --blue:     #185fa5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #1a1a18;
      --surface:  #242422;
      --surface2: #2e2e2c;
      --border:   rgba(255,255,255,0.10);
      --border2:  rgba(255,255,255,0.18);
      --text1:    #f0efe8;
      --text2:    #a8a8a0;
      --text3:    #686860;
      --ok:       #97c459;
      --ok-bg:    #1e2e10;
      --warn:     #ef9f27;
      --warn-bg:  #2a1e08;
      --alert:    #f09595;
      --alert-bg: #2e1010;
      --manual:   #68686a;
      --manual-bg:#28282a;
      --blue:     #85b7eb;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text1);
    font-size: 15px;
    line-height: 1.5;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border2);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .topbar-sub { font-size: 12px; color: var(--text3); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .pulse { display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; background: var(--ok); margin-right: 5px;
    animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  #status-dot.warn  { background: var(--warn); animation: none; }
  #status-dot.alert { background: var(--alert); animation: pulse 1s infinite; }
  #status-dot.error { background: var(--alert); animation: none; opacity: .5; }

  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  .summary-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.5rem; align-items: center;
  }
  .pill {
    font-size: 12px; padding: 3px 10px;
    border-radius: 99px; font-weight: 500;
  }
  .pill-ok     { background: var(--ok-bg);     color: var(--ok); }
  .pill-warn   { background: var(--warn-bg);   color: var(--warn); }
  .pill-alert  { background: var(--alert-bg);  color: var(--alert); }
  .pill-manual { background: var(--manual-bg); color: var(--manual); }
  .pill-error  { background: var(--alert-bg);  color: var(--alert); opacity:.7; }
  .summary-date { font-size: 12px; color: var(--text3); margin-left: auto; }

  .sector { margin-bottom: 1.75rem; }
  .sector-header {
    font-size: 11px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }

  /* Tier sub-headers within sectors */
  .tier-subheader {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
    padding: 5px 0 5px 10px;
    margin: 14px 0 8px;
    border-left: 3px solid var(--tier-color, var(--border2));
    color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .tier-subheader:first-of-type { margin-top: 4px; }
  .tier-subheader .tier-desc {
    font-size: 10px; font-weight: 400; letter-spacing: .02em;
    color: var(--text3); text-transform: none;
  }
  .tier-1 { --tier-color: #b8860b; }
  .tier-2 { --tier-color: #4a7fa5; }
  .tier-3 { --tier-color: #4a8c5c; }
  @media (prefers-color-scheme: dark) {
    .tier-1 { --tier-color: #d4a94a; }
    .tier-2 { --tier-color: #7ab3d4; }
    .tier-3 { --tier-color: #7abf90; }
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
    overflow: visible;
  }
  .sector { overflow: visible; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 10px;
    position: relative;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card.is-alert { border-color: var(--alert); background: var(--alert-bg); }
  .card.is-warn  { border-color: var(--warn);  background: var(--warn-bg); }
  .card.is-manual { opacity: .65; }
  /* Muted transport cards — present but lower visual urgency */
  .card.is-muted { opacity: .7; }
  .card.is-muted.is-alert {
    border-color: var(--warn); background: var(--warn-bg);
  }
  .card.is-muted.is-alert .card-value { color: var(--warn); }
  .card.is-muted.is-alert .card-note  { color: var(--warn); }
  .card.is-muted:hover { opacity: 1; }
  .card.is-manual .card-info-btn { opacity: 1; }
  .card.is-manual:hover { opacity: 1; }

  .card-dot {
    position: absolute; top: 11px; right: 11px;
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-ok     { background: var(--ok); }
  .dot-warn   { background: var(--warn); }
  .dot-alert  { background: var(--alert); }
  .dot-manual { background: var(--manual); }
  .dot-error  { background: var(--alert); opacity: .5; }

  .card-label {
    font-size: 12px; color: var(--text2);
    margin-bottom: 4px; padding-right: 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-value {
    font-size: 22px; font-weight: 600;
    letter-spacing: -.02em; line-height: 1.1;
    color: var(--text1);
  }
  .card.is-alert .card-value { color: var(--alert); }
  .card.is-warn  .card-value { color: var(--warn); }
  .card.is-manual .card-value {
    font-size: 13px; font-weight: 400;
    color: var(--text3); margin-top: 2px;
  }
  .card-unit    { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .card-context { font-size: 11px; color: var(--text2); margin-top: 3px; font-style: italic; }
  .card-date    { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .card-note {
    font-size: 11px; color: var(--warn);
    margin-top: 5px; line-height: 1.3;
  }
  .card.is-alert .card-note { color: var(--alert); }


  .card-tier {
    display: inline-block;
    font-size: 10px; font-weight: 600; letter-spacing: .04em;
    padding: 1px 6px; border-radius: 99px;
    margin-top: 5px;
    background: rgba(24,95,165,0.10); color: var(--blue);
    opacity: .8;
  }
  @media (prefers-color-scheme: dark) {
    .card-tier { background: rgba(133,183,235,0.12); }
  }

  /* ── Notes tooltip ─────────────────────────────────────────────────────── */
  /* The card is the positioning parent (already position:relative). */
  .card-info-btn {
    position: absolute; bottom: 9px; right: 10px;
    width: 16px; height: 16px; border-radius: 50%;
    background: transparent;
    border: 0.5px solid var(--border2);
    color: var(--text3);
    font-size: 10px; font-weight: 700; line-height: 16px;
    text-align: center; cursor: default;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: border-color .1s, color .1s;
    z-index: 1;
  }
  .card:hover .card-info-btn { border-color: var(--blue); color: var(--blue); }

  .card-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    max-height: 340px;
    overflow-y: auto;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 10px 13px;
    font-size: 11px; line-height: 1.55; color: var(--text2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 100;
    pointer-events: auto;
    white-space: normal;
  }
  .tooltip-scraper {
    color: var(--text2);
  }
  .tooltip-divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 7px 0;
  }
  .tooltip-knowledge-title {
    font-weight: 600; color: var(--text1);
    margin-bottom: 3px; font-size: 11px;
  }
  .tooltip-knowledge-body {
    color: var(--text2);
  }
  /* Flip to below the card when near the top of the viewport */
  .card-tooltip.flip-down {
    bottom: auto;
    top: calc(100% + 6px);
  }
  /* Nudge left/right when centered tooltip would overflow viewport edges */
  .card-tooltip.nudge-left  { left: auto; right: -6px;  transform: none; }
  .card-tooltip.nudge-right { left: -6px; transform: none; }
  /* tooltip shown/hidden via JS mouseenter/mouseleave — see script */

  /* Ensure cards in the last grid row don't clip their tooltip */
  .cards { overflow: visible; }
  .sector { overflow: visible; }

  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 12px; color: var(--text2);
    margin-bottom: 1.25rem; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .footer {
    font-size: 11px; color: var(--text3);
    border-top: 0.5px solid var(--border);
    padding: 1rem 0 2rem;
    margin-top: .5rem;
    display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }

  #loading {
    text-align: center; padding: 4rem 0;
    font-size: 14px; color: var(--text3);
  }
  #error-msg {
    background: var(--alert-bg);
    border: 0.5px solid var(--alert);
    border-radius: 8px; padding: 1rem;
    color: var(--alert); font-size: 13px;
    margin: 2rem 0; display: none;
  }

  .brief-panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.75rem;
  }
  .brief-header {
    display: flex; align-items: baseline;
    justify-content: space-between; flex-wrap: wrap;
    gap: 8px; margin-bottom: 1rem;
    padding-bottom: .75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .brief-title { font-size: 14px; font-weight: 600; color: var(--text1); }
  .brief-date  { font-size: 12px; color: var(--text3); }
  .brief-badge {
    font-size: 11px; padding: 2px 8px;
    border-radius: 99px; font-weight: 500;
    background: var(--warn-bg); color: var(--warn);
  }
  .brief-content { font-size: 14px; line-height: 1.7; color: var(--text1); }
  .brief-content h2 {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 1rem 0 .4rem;
  }
  .brief-content h2:first-child { margin-top: 0; }
  .brief-content p  { margin-bottom: .75rem; }
  .brief-content ul { margin: .25rem 0 .75rem 1.25rem; }
  .brief-content li { margin-bottom: .25rem; }
  .brief-content em { color: var(--text2); font-style: normal; font-size: 12px; }
  .brief-escalated { border-color: var(--alert); }
  .brief-escalated .brief-badge { background: var(--alert-bg); color: var(--alert); }
  .brief-loading { font-size: 13px; color: var(--text3); font-style: italic; }
  .snapshot-banner {
    display: none;
    background: var(--warn-bg); color: var(--warn);
    border: 1px solid var(--warn); border-radius: 6px;
    padding: 8px 14px; font-size: 13px; margin-bottom: 1rem;
  }
  .snapshot-banner a { color: var(--warn); text-decoration: underline; }

  /* ── Triage cards ─────────────────────────────────────────────────────── */
  .triage-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 640px) { .triage-wrap { grid-template-columns: 1fr; } }
  .triage-card {
    background: var(--bg);
    border-radius: 12px;
    border: 0.5px solid var(--border2);
    overflow: hidden;
  }
  .triage-header {
    padding: 9px 14px 7px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 0.5px solid var(--border2);
  }
  .triage-hdot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .triage-hdot.alert { background: var(--alert); }
  .triage-hdot.warn  { background: var(--warn); }
  .triage-htitle {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .triage-section { padding: 4px 0 6px; }
  .triage-slabel {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 14px 4px;
    color: var(--text3);
  }
  .triage-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    padding: 4px 14px;
    align-items: start;
  }
  .triage-name {
    font-size: 12.5px;
    color: var(--text1);
    line-height: 1.3;
  }
  .triage-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }
  .triage-right { text-align: right; }
  .triage-val {
    font-size: 12.5px;
    font-weight: 500;
    display: block;
    white-space: nowrap;
  }
  .triage-val.alert { color: var(--alert); }
  .triage-val.warn  { color: var(--warn); }
  .triage-val.alert-sustained { color: #791F1F; }
  .triage-val.warn-sustained  { color: #633806; }
  @media (prefers-color-scheme: dark) {
    .triage-val.alert-sustained { color: #F7C1C1; }
    .triage-val.warn-sustained  { color: #FAC775; }
  }
  .triage-date {
    font-size: 10.5px;
    color: var(--text3);
    display: block;
    margin-top: 1px;
    white-space: nowrap;
  }
  .tier-pill {
    display: inline-block;
    font-size: 9.5px;
    font-weight: 500;
    padding: 1px 4px;
    border-radius: 4px;
    margin-left: 3px;
    background: var(--bg2);
    color: var(--text3);
    vertical-align: middle;
  }
  .triage-divider { height: 0.5px; margin: 2px 14px; background: var(--border2); }
  .sustained-section-alert {
    background: #FCEBEB;
  }
  .sustained-section-warn {
    background: #FAEEDA;
  }
  .sustained-section-alert .triage-slabel { color: #A32D2D; }
  .sustained-section-warn  .triage-slabel { color: #854F0B; }
  .sustained-section-alert .triage-meta   { color: #A32D2D; opacity: 0.7; }
  .sustained-section-warn  .triage-meta   { color: #854F0B; opacity: 0.7; }
  @media (prefers-color-scheme: dark) {
    .sustained-section-alert { background: #501313; }
    .sustained-section-warn  { background: #412402; }
    .sustained-section-alert .triage-slabel { color: #F09595; }
    .sustained-section-warn  .triage-slabel { color: #FAC775; }
    .sustained-section-alert .triage-meta   { color: #F09595; opacity: 0.7; }
    .sustained-section-warn  .triage-meta   { color: #FAC775; opacity: 0.7; }
  }

  </style>
</head>

// Match an indicator name to a knowledge entry.
// Returns the knowledge object or null.
function lookupKnowledge(indicatorName) {
  const n = (indicatorName || "").toLowerCase();
  // Check keys from longest to shortest to prefer more specific matches
  const keys = Object.keys(CARD_KNOWLEDGE).sort((a, b) => b.length - a.length);
  for(const key of keys) {
    if(n.includes(key)) return CARD_KNOWLEDGE[key];
  }
  return null;
}

function lookupTier(indicatorName) {
  const n = (indicatorName || "").toLowerCase();
  const keys = Object.keys(TIER_MAP).sort((a, b) => b.length - a.length);
  for(const key of keys) {
    if(n.includes(key)) return TIER_MAP[key];
  }
  return null;
}

function inferSector(name) {
  const n = (name||"").toLowerCase();
  if(/nuclear|hydro|gas output|wind|solar|biofuel|ontario demand|peak demand|generation|brent|storage|grid|reserve|tcpl|pipeline|parkway|mainline|dawn|enbridge/.test(n)) return "energy";
  if(/water|watermain|wwtp/.test(n)) return "water";
  if(/icu|er capacity|wastewater|blood|shelter/.test(n)) return "health";
  if(/cpi|grocery|food bank|inflation/.test(n)) return "food";
  if(/ttc|ridership|port|dwell|pearson|notam|airport|cyyz|go transit|via rail|freight|labour risk|cn rail|cn freight|cpkc|rail corridor/.test(n)) return "transport_logistics";
  if(/aqhi|air quality|smog/.test(n)) return "environment";
  if(/bank|rate|cad|usd|fuel|price|bankruptcy|insolvency|eviction|unemployment|trreb|sales.to.new|selling price/.test(n)) return "financial";
  if(/tps|sworn|fill rate|community safety|specialized operations|police staffing/.test(n)) return "public_safety";
  return "other";
}

function inferTier(notes) {
  // Extract tier label from the notes field written by the scraper.
  // Returns "T1", "T2", "T3", or null.
  if(!notes) return null;
  const m = notes.match(/Tier\s+([123])\s*[—–-]/i);
  if(!m) return null;
  return "T" + m[1];
}

function fmtValue(r) {
  const v = r.value;
  if(v === null || v === undefined) return "manual";
  if(typeof v === "number") {
    if(v >= 10000) return v.toLocaleString("en-CA", {maximumFractionDigits:0});
    if(v >= 1000)  return v.toLocaleString("en-CA", {maximumFractionDigits:0});
    if(v >= 100)   return v.toLocaleString("en-CA", {maximumFractionDigits:1});
    if(v >= 1)     return v.toLocaleString("en-CA", {maximumFractionDigits:2});
    return v.toLocaleString("en-CA", {maximumFractionDigits:4});
  }
  return String(v);
}

function fmtDate(d) {
  if(!d) return "";
  const s = String(d).trim();
  // ISO datetime: "2026-03-22T14:30:00Z" or "2026-03-22 14:30:00Z" — show date + HH:MM
  if(s.length >= 16 && (s[10] === "T" || s[10] === " ")) {
    return s.slice(0,10) + " " + s.slice(11,16);
  }
  // Date only
  if(s.length >= 10) return s.slice(0,10);
  return s;
}

function dotClass(s) {
  return {ok:"dot-ok",warn:"dot-warn",alert:"dot-alert",
          manual:"dot-manual",error:"dot-error"}[s] || "dot-manual";
}

function simpleMarkdown(md) {
  if(!md) return "";
  // Use string replace where possible to avoid regex/newline issues in sandboxed environments
  let out = md;
  out = out.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  out = out.replace(/^\* (.+)$/gm, "<li>$1</li>");
  out = out.split("\n\n").join("</p><p>");
  out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return out.trim();
}

async function loadBrief(isAlert) {
  const panel = document.getElementById("brief-panel");
  panel.style.display = "none";
  try {
    const res = await fetch(BRIEF_URL + "?t=" + Date.now());
    if(!res.ok) throw new Error("not found");
    const md = await res.text();

    let lines = md.split("\n");

    // Strip YAML frontmatter (--- ... ---) if present
    if(lines[0] && lines[0].trim() === "---") {
      const end = lines.findIndex((l, i) => i > 0 && l.trim() === "---");
      if(end !== -1) lines = lines.slice(end + 1);
    }

    // Find the heading line and body
    const headingIdx = lines.findIndex(l => l.startsWith("#"));
    const dateMatch  = lines.find(l => l.startsWith("*Week of"));
    const briefDate  = dateMatch ? dateMatch.replace(/\*/g, "").trim() : "";

    // Body = everything after the heading (or from the top if no heading)
    const bodyLines = lines.slice(headingIdx >= 0 ? headingIdx + 1 : 0);
    const body = bodyLines.join("\n").trim();

    // Hide panel if there is no real content
    if(!body || body.replace(/\s/g, "").length < 20) return;

    const escalated = isAlert ? " brief-escalated" : "";
    const badge = isAlert
      ? '<span class="brief-badge">Alert escalation — updated daily</span>'
      : '<span class="brief-badge" style="background:var(--ok-bg);color:var(--ok)">Weekly brief</span>';

    panel.style.display = "block";
    panel.innerHTML = `
      <div class="brief-panel${escalated}">
        <div class="brief-header">
          <span class="brief-title">Intelligence brief</span>
          ${badge}
          <span class="brief-date">${briefDate}</span>
        </div>
        <div class="brief-content"><p>${simpleMarkdown(body)}</p></div>
      </div>`;
  } catch(e) {
    panel.style.display = "none";
  }
}


function renderTriageCards(results) {
  function escHtml(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  const wrap = document.getElementById("triage-wrap");
  if(!wrap) return;
  const SUSTAINED_DAYS = 14;
  const today = new Date();
  const SECTOR_LABELS_SHORT = {
    energy:"Energy",water:"Water",health:"Health",
    transport_logistics:"Transport & logistics",financial:"Financial",
    public_safety:"Public safety",environment:"Environment",
    food:"Food & prices",housing:"Housing"
  };
  const SECTOR_ORDER_IDX = ["energy","water","health","transport_logistics",
                             "financial","public_safety","environment","food","housing"];
  function isSustained(r) {
    const dd = r.data_date||""; if(!dd) return false;
    try { return (today - new Date(dd.slice(0,10)))/86400000 >= SUSTAINED_DAYS; }
    catch(e) { return false; }
  }
  function getSector(r) {
    const ti = lookupTier(r.indicator);
    return r.sector||(ti&&ti.sector)||inferSector(r.indicator)||"other";
  }
  function getTier(r) { const ti=lookupTier(r.indicator); return ti?ti.tier:null; }
  function sortPriority(a,b) {
    const sa=SECTOR_ORDER_IDX.indexOf(getSector(a)),sb=SECTOR_ORDER_IDX.indexOf(getSector(b));
    const sd=(sa===-1?99:sa)-(sb===-1?99:sb); if(sd!==0) return sd;
    return (getTier(a)||9)-(getTier(b)||9);
  }
  function fmtDate(r) { return (r.data_date||"").slice(0,10); }
  function buildSection(items,statusCls,sustained) {
    if(!items.length) return "";
    const sc = sustained?"sustained-section-"+statusCls:"";
    const lbl = sustained?"Sustained":"New / escalating";
    const vc  = sustained?statusCls+"-sustained":statusCls;
    const rows = items.map(r=>{
      const sl = SECTOR_LABELS_SHORT[getSector(r)]||getSector(r);
      const t  = getTier(r);
      const tb = t?'<span class="tier-pill">T'+t+'</span>':"";
      const v  = fmtValue(r); const u=r.unit||"";
      const dv = u?(v+" "+u).trim():v;
      const dt = fmtDate(r);
      return '<div class="triage-row">'+
        '<div><span class="triage-name">'+escHtml(r.indicator)+tb+'</span>'+
        '<span class="triage-meta">'+escHtml(sl)+'</span></div>'+
        '<div class="triage-right">'+
        '<span class="triage-val '+vc+'">'+escHtml(dv)+'</span>'+
        '<span class="triage-date">'+escHtml(dt)+'</span></div></div>';
    }).join("");
    return '<div class="triage-section '+sc+'"><div class="triage-slabel">'+lbl+'</div>'+rows+'</div>';
  }
  function buildTriageCard(statusCls,title,items) {
    if(!items.length) return "";
    const fresh     = items.filter(r=>!isSustained(r)).sort(sortPriority);
    const sustained = items.filter(r=> isSustained(r)).sort(sortPriority);
    const fs = buildSection(fresh,statusCls,false);
    const ss = buildSection(sustained,statusCls,true);
    const div= (fresh.length&&sustained.length)?'<div class="triage-divider"></div>':"";
    return '<div class="triage-card">'+
      '<div class="triage-header">'+
      '<div class="triage-hdot '+statusCls+'"></div>'+
      '<span class="triage-htitle">'+title+'</span></div>'+
      fs+div+ss+'</div>';
  }
  const ai = results.filter(r=>r.status==="alert"&&r.value!==null);
  const wi = results.filter(r=>r.status==="warn" &&r.value!==null);
  const ac = buildTriageCard("alert","Active alerts",ai);
  const wc = buildTriageCard("warn","Watch conditions",wi);
  if(!ac&&!wc){wrap.style.display="none";return;}
  wrap.innerHTML=ac+wc;
  wrap.style.display="grid";
}


function render(data) {
  const results = data.results || [];
  const t = data.totals || {};
  const ts = data.run_timestamp || "";
  const rd = data.run_date || ts.slice(0,10);

  // Build a human-readable datetime string from the ISO timestamp
  // run_timestamp is UTC ISO: "2026-03-22T14:30:00Z"
  let rdDisp = rd || "unknown";
  let rdFull = rd || "unknown";
  if(ts && ts.length >= 16) {
    const dateStr = ts.slice(0,10);
    const timeStr = ts.slice(11,16);   // HH:MM
    rdFull  = `${dateStr} ${timeStr} UTC`;
    rdDisp  = rdFull;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  renderTriageCards(results);
  document.getElementById("topbar-sub").textContent = rdDisp;

  const dot = document.getElementById("status-dot");
  dot.className = "pulse";
  if((t.alert||0) > 0)     { dot.className = "alert"; }
  else if((t.warn||0) > 0) { dot.className = "warn"; }

  const bar = document.getElementById("summary-bar");
  bar.innerHTML = "";
  const pills = [
    [t.ok,    "ok",     "ok"],
    [t.warn,  "warn",   "warn"],
    [t.alert, "alert",  "alert"],
    [t.error, "error",  "errors"],
    [t.manual,"manual", "manual"],
  ];
  for(const [n, cls, label] of pills) {
    if(!n) continue;
    const p = document.createElement("span");
    p.className = `pill pill-${cls}`;
    p.textContent = `${n} ${label}`;
    bar.appendChild(p);
  }



  const bySector = {};
  for(const r of results) {
    // Three-way fallback: JSON sector field → TIER_MAP sector → inferSector
    const tierInfo = lookupTier(r.indicator);
    const s = r.sector || (tierInfo && tierInfo.sector) || inferSector(r.indicator);
    if(!bySector[s]) bySector[s] = [];
    bySector[s].push(r);
  }

  const allKeys = [...SECTOR_ORDER];
  for(const k of Object.keys(bySector)) {
    if(!allKeys.includes(k)) allKeys.push(k);
  }

  loadBrief((t.alert||0) > 0);

  const sectorsEl = document.getElementById("sectors");
  sectorsEl.innerHTML = "";

  // Build a single card element from a result object
  function buildCard(r) {
    const s = r.status || "manual";
    const isManual = s === "manual" || r.value === null;
    // Muted indicators — valid signals but lower consequence than critical infrastructure
    const MUTED_INDICATORS = ["go transit"];
    const isMuted = MUTED_INDICATORS.some(m => (r.indicator||"").toLowerCase().includes(m));
    const card = document.createElement("div");
    card.className = "card"
      + (s==="alert"?" is-alert":s==="warn"?" is-warn":isManual?" is-manual":"")
      + (isMuted?" is-muted":"");

    let noteHtml = "";
    if(r.threshold_note && !isManual) {
      noteHtml = `<div class="card-note">${r.threshold_note}</div>`;
    }
    const contextHtml = (r.context && !isManual)
      ? `<div class="card-context">${r.context}</div>` : "";

    // Tier badge from notes field (energy only — others use sub-headers now)
    const tierBadge = inferTier(r.notes);
    const tierHtml = tierBadge ? `<div class="card-tier">${tierBadge}</div>` : "";

    // Tooltip: scraper notes + static knowledge
    const scraperText = (r.notes || "").replace(/^Tier\s+\d+\s*[—\u2013\u2014-]\s*/i, "").trim();
    const knowledge = lookupKnowledge(r.indicator);
    const hasTooltip = scraperText || knowledge;

    let tooltipInner = "";
    if(scraperText) tooltipInner += `<div class="tooltip-scraper">${scraperText}</div>`;
    if(knowledge) {
      if(scraperText) tooltipInner += `<hr class="tooltip-divider">`;
      tooltipInner += `<div class="tooltip-knowledge-title">${knowledge.title}</div>`;
      tooltipInner += `<div class="tooltip-knowledge-body">${knowledge.body}</div>`;
    }
    const infoHtml = hasTooltip
      ? `<div class="card-info-btn" aria-label="Notes">i</div>
         <div class="card-tooltip">${tooltipInner}</div>` : "";

    card.innerHTML = `
      <div class="card-dot ${dotClass(s)}"></div>
      <div class="card-label">${r.indicator}</div>
      <div class="card-value">${isManual ? "manual" : fmtValue(r)}</div>
      ${!isManual ? `<div class="card-unit">${r.unit||""}</div>` : ""}
      ${contextHtml}
      ${tierHtml}
      <div class="card-date">${fmtDate(r.data_date)}</div>
      ${noteHtml}
      ${infoHtml}`;
    return card;
  }

  // Append a grid of cards (items array) to a parent element
  function appendCardGrid(parent, items) {
    const grid = document.createElement("div");
    grid.className = "cards";
    parent.appendChild(grid);
    for(const r of items) grid.appendChild(buildCard(r));
    return grid;
  }

  for(const sKey of allKeys) {
    const items = bySector[sKey];
    if(!items || items.length === 0) continue;

    const sec = document.createElement("div");
    sec.className = "sector";
    const sectorLink = sKey === "transport_logistics"
      ? ` <a href="freight-profile.html" target="_blank" rel="noopener" style="font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--blue);margin-left:8px;opacity:.8">What\u2019s at stake &rarr;</a>`
      : sKey === "energy"
      ? ` <a href="fuel-profile.html" target="_blank" rel="noopener" style="font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--blue);margin-left:8px;opacity:.8">What\u2019s at stake &rarr;</a>`
      : "";
    sec.innerHTML = `<div class="sector-header">${SECTOR_LABELS[sKey]||sKey}${sectorLink}</div>`;

    // Group items by tier
    const byTier = {};
    const noTier = [];
    for(const r of items) {
      const t = lookupTier(r.indicator);
      if(t && t.tier) {
        if(!byTier[t.tier]) byTier[t.tier] = [];
        byTier[t.tier].push(r);
      } else {
        noTier.push(r);
      }
    }

    const tierNums = Object.keys(byTier).map(Number).sort();
    const hasTiers = tierNums.length > 0;

    for(const tNum of tierNums) {
      const tierLabel = (TIER_META[sKey] || {})[tNum] || `Tier ${tNum}`;
      const subhdr = document.createElement("div");
      subhdr.className = `tier-subheader tier-${tNum}`;
      subhdr.innerHTML = `<span>Tier ${tNum}</span><span class="tier-desc">${tierLabel}</span>`;
      sec.appendChild(subhdr);
      appendCardGrid(sec, byTier[tNum]);
    }

    if(noTier.length > 0) {
      if(hasTiers) {
        const subhdr = document.createElement("div");
        subhdr.className = "tier-subheader";
        subhdr.style.cssText = "--tier-color: var(--border2)";
        subhdr.innerHTML = `<span class="tier-desc">Unclassified</span>`;
        sec.appendChild(subhdr);
      }
      appendCardGrid(sec, noTier);
    }

    sectorsEl.appendChild(sec);
  }

  // After render: correct tooltips that would overflow the viewport
  requestAnimationFrame(() => {
    document.querySelectorAll(".card-tooltip").forEach(tip => {
      tip.style.display = "block";
      const r = tip.getBoundingClientRect();
      tip.style.display = "";
      if(r.top < 4)                         tip.classList.add("flip-down");
      if(r.right > window.innerWidth - 4)   tip.classList.add("nudge-left");
      else if(r.left < 4)                   tip.classList.add("nudge-right");
    });
  });

  document.getElementById("footer-sources").textContent =
    "Sources: IESO · Bank of Canada · StatsCan · Toronto Open Data · Environment Canada · data.ontario.ca · open.canada.ca · NAV Canada · Toronto Police ASR · Stooq · Stockr · EIA";
  document.getElementById("footer-run").textContent =
    `TII v3.5 · scraper run ${rdFull} · auto-refresh every 6 hours`;
}

function showError(msg) {
  document.getElementById("loading").style.display = "none";
  const e = document.getElementById("error-msg");
  e.style.display = "block";
  e.textContent = msg;
}

async function loadData() {
  // If a ?data= param is set, show a snapshot banner so readers know this is a frozen view
  const params = new URLSearchParams(window.location.search);
  const dataParam = params.get("data");
  if(dataParam) {
    const banner = document.getElementById("snapshot-banner");
    if(banner) {
      banner.style.display = "block";
      banner.innerHTML = `<strong>📅 Weekly snapshot</strong> — This view is frozen to <strong>${dataParam}</strong>. `
        + `<a href="https://criticalto.ca" target="_blank">View live dashboard →</a>`;
    }
  }
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now(), {
      cache: "no-store",
      headers: { "Cache-Control": "no-cache" }
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } catch(e) {
    if(document.getElementById("dashboard").style.display === "none") {
      showError(`Could not load ${DATA_URL} — ${e.message}. ` +
        "Place tii_data_latest.json in the same folder as this HTML file, " +
        "or set DATA_URL to your JSON endpoint.");
    }
  }
}

loadData();

// ── Tooltip hover with grace period ──────────────────────────────────────────
// pointer-events: auto on tooltip means mouse can enter it to scroll.
// hideDelay gives the mouse time to travel from card into tooltip.
(function() {
  var HIDE_DELAY = 120; // ms grace period to move mouse into tooltip
  document.addEventListener("mouseover", function(e) {
    var card = e.target.closest(".card");
    if(!card) return;
    var tip = card.querySelector(".card-tooltip");
    if(!tip) return;
    clearTimeout(card._hideTimer);
    tip.style.display = "block";
    // Flip/nudge correction on first show
    if(!card._positioned) {
      card._positioned = true;
      var r = tip.getBoundingClientRect();
      if(r.top < 4)                        tip.classList.add("flip-down");
      if(r.right > window.innerWidth - 4)  tip.classList.add("nudge-left");
      else if(r.left < 4)                  tip.classList.add("nudge-right");
    }
  });
  document.addEventListener("mouseout", function(e) {
    var card = e.target.closest(".card");
    if(!card) return;
    var tip = card.querySelector(".card-tooltip");
    if(!tip) return;
    // Only hide if mouse left both card AND tooltip
    var to = e.relatedTarget;
    if(to && (card.contains(to) || tip.contains(to))) return;
    card._hideTimer = setTimeout(function() {
      tip.style.display = "none";
    }, HIDE_DELAY);
  });
  // If mouse enters tooltip, cancel the hide timer
  document.addEventListener("mouseover", function(e) {
    var tip = e.target.closest(".card-tooltip");
    if(!tip) return;
    var card = tip.closest(".card");
    if(card) clearTimeout(card._hideTimer);
  });
  // If mouse leaves tooltip entirely (not back into card), hide
  document.addEventListener("mouseout", function(e) {
    var tip = e.target.closest(".card-tooltip");
    if(!tip) return;
    var card = tip.closest(".card");
    if(!card) return;
    var to = e.relatedTarget;
    if(to && (card.contains(to) || tip.contains(to))) return;
    card._hideTimer = setTimeout(function() {
      tip.style.display = "none";
    }, HIDE_DELAY);
  });
})();
</script>
