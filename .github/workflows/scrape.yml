name: TII data scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openpyxl xlrd

      - name: Run scraper
        run: python tii_scraper.py --no-connectivity-check

- name: Archive weekly snapshot
  if: github.event_name == 'schedule' && contains(github.event.schedule, '0 6 * * 0')
  run: |
    WEEK=$(date +"%Y-W%V")
    cp tii_data_latest.json tii_data_weekly_${WEEK}.json
    cp tii_brief_latest.md archive/tii_brief_${WEEK}.md 2>/dev/null || true
    git add tii_data_weekly_${WEEK}.json archive/ || true
    git commit -m "Weekly archive: ${WEEK}" || echo "Nothing to archive"
    git push

      - name: Commit updated JSON
        run: |
          git config user.name  "TII Scraper"
          git config user.email "tii-scraper@users.noreply.github.com"
          git add tii_data_latest.json tii_data_$(date +%Y%m%d).json || true
          git diff --cached --quiet || git commit -m "data: scraper run $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
